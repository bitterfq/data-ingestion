version: '3.8'

services:
  # Zookeeper (required by Kafka)
  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - data_pipeline

  # Kafka broker
  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - data_pipeline

  # Your existing MinIO service with Kafka integration
  minio:
    container_name: minio
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000" # MinIO API port
      - "9001:9001" # MinIO Console port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Kafka notification settings
      MINIO_NOTIFY_KAFKA_ENABLE: "on"
      MINIO_NOTIFY_KAFKA_BROKERS: "kafka:9092"
      MINIO_NOTIFY_KAFKA_TOPIC: "file-events"
    volumes:
      - ~/minio/data:/data
    command: server /data --console-address ":9001"
    depends_on:
      - kafka
    networks:
      - data_pipeline

  # Automated MinIO setup container
  minio-setup:
    container_name: minio-setup
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be ready...';
      sleep 10;
      
      echo 'Setting up MinIO alias...';
      mc alias set minio http://minio:9000 minioadmin minioadmin;
      
      echo 'Creating buckets...';
      mc mb minio/raw --ignore-existing;
      mc mb minio/processed --ignore-existing;
      
      echo 'Setting up bucket notifications for Kafka...';
      mc event add minio/raw arn:minio:sqs::kafka:file-events --event put;
      
      echo 'Verifying bucket notifications...';
      mc event list minio/raw;
      
      echo 'MinIO setup completed successfully!';
      echo 'Upload a file to test: mc cp /etc/hosts minio/raw/test-file.txt';
      "
    networks:
      - data_pipeline

  # Optional: Kafka UI for monitoring
  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - data_pipeline

networks:
  data_pipeline:
    driver: bridge