services:
  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - data_pipeline

  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - data_pipeline

  minio:
    container_name: minio
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ~/minio/data:/data
    command: server /data --console-address ":9001"
    depends_on:
      - kafka
    networks:
      - data_pipeline

  # Bridge service using Python image directly
  kafka-airbyte-bridge:
    container_name: kafka-airbyte-bridge
    image: python:3.11-slim
    volumes:
      - ./bridge_service.py:/app/bridge_service.py
    working_dir: /app
    command: bash -c "pip install kafka-python==2.0.2 requests==2.31.0 minio==7.2.16 pandas==2.1.4 pyarrow==14.0.1 numpy==1.26.0 && python bridge_service.py"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: file-events
    depends_on:
      - kafka
      - minio
    networks:
      - data_pipeline
    restart: unless-stopped

  airbyte-db:
    container_name: airbyte-db
    image: postgres:13-alpine
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: airbyte
    volumes:
      - airbyte_db_data:/var/lib/postgresql/data
    networks:
      - data_pipeline

  airbyte:
    container_name: airbyte
    image: airbyte/server:0.50.33
    ports:
      - "8001:8001"
      - "8000:8000"
    environment:
      DATABASE_USER: docker
      DATABASE_PASSWORD: docker
      DATABASE_URL: jdbc:postgresql://airbyte-db:5432/airbyte
      WORKSPACE_ROOT: /tmp/workspace
      CONFIG_ROOT: /data
    volumes:
      - airbyte_data:/data
      - airbyte_workspace:/tmp/workspace
    depends_on:
      - airbyte-db
    networks:
      - data_pipeline

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - data_pipeline

networks:
  data_pipeline:
    driver: bridge

volumes:
  airbyte_data:
  airbyte_workspace:
  airbyte_db_data: